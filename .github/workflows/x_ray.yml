name: Deploy Xray Panel with Cloudflare Tunnel

on:
  workflow_dispatch:   # اجرای دستی از طریق دکمه‌ی "Run workflow"

jobs:
  setup-panel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker and Docker Compose
        run: |
          sudo apt update
          sudo apt install -y docker.io docker-compose
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker $USER

      - name: Run 3x-ui panel (Xray panel)
        run: |
          docker run -d \
            --name xray-panel \
            --restart unless-stopped \
            -p 54321:54321 \
            -v ~/xray-db:/etc/x-ui/ \
            -v ~/xray-cert:/root/cert/ \
            ghcr.io/mhsanaei/3x-ui:latest

      - name: Wait for panel to be ready
        run: |
          echo "Waiting for panel to start..."
          sleep 10
          # بررسی آمادگی پنل
          for i in {1..30}; do
            if curl -s http://localhost:54321 > /dev/null; then
              echo "Panel is ready"
              break
            fi
            sleep 2
          done

      - name: Download and run Cloudflare Tunnel (trycloudflare.com)
        id: tunnel
        run: |
          # دانلود cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          # اجرا در پس‌زمینه و ذخیره لاگ
          nohup ./cloudflared-linux-amd64 tunnel --url http://localhost:54321 --logfile cloudflared.log &
          sleep 15
          # استخراج URL اختصاصی از لاگ
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "::notice title=Tunnel URL::$TUNNEL_URL"

      - name: Get panel credentials
        id: credentials
        run: |
          # در 3x-ui پیش‌فرض admin/admin است
          DEFAULT_USER="admin"
          DEFAULT_PASS="admin"
          echo "PANEL_URL=${{ env.TUNNEL_URL }}" >> $GITHUB_OUTPUT
          echo "USERNAME=$DEFAULT_USER" >> $GITHUB_OUTPUT
          echo "PASSWORD=$DEFAULT_PASS" >> $GITHUB_OUTPUT
          
          echo "::notice title=Access Panel::URL: ${{ env.TUNNEL_URL }}"
          echo "::notice title=Username::$DEFAULT_USER"
          echo "::notice title=Password::$DEFAULT_PASS"

      - name: Show connection info (for manual use)
        run: |
          echo "=============================="
          echo "✅ پنل Xray با موفقیت راه‌اندازی شد!"
          echo "🔗 لینک پنل: ${{ env.TUNNEL_URL }}"
          echo "👤 نام کاربری: admin"
          echo "🔑 رمز عبور: admin"
          echo ""
          echo "⚠️ توجه: پس از بسته شدن این Workflow (یا اتمام زمان اجرا)، پنل غیرفعال می‌شود."
          echo "برای ساخت کانفیگ V2Ray وارد پنل شوید و از منوی 'Inbound' یک inbound اضافه کنید."
          echo "=============================="

      - name: Keep the workflow alive (6 hours max)
        run: |
          echo "Maintaining tunnel for up to 6 hours..."
          echo "Press Ctrl+C to stop locally, or cancel workflow from GitHub UI."
          sleep 6h