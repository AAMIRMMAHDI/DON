name: 📥 دانلود ویدیو (ساده)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک ویدیو (مثلاً یوتیوب)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: بررسی لینک
        run: |
          if [ -z "${{ github.event.inputs.video_url }}" ]; then
            echo "❌ لینک ویدیو وارد نشده است!"
            exit 1
          fi
          echo "✅ لینک دریافت شد: ${{ github.event.inputs.video_url }}"

      - name: نصب yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install yt-dlp

      - name: دانلود ویدیو
        run: |
          yt-dlp \
            --format "best[height<=720]/best" \
            --no-playlist \
            --output "video.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: آپلود فایل به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: video.*