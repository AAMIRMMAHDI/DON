name: 🎬 وی‌پلیر (دانلودر تحت وب با تونل خودکار)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون و پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip wget
          pip3 install -r requirements.txt

      - name: 📁 ایجاد پوشه‌های استاتیک و دانلود منابع محلی (socket.io + فونت)
        run: |
          mkdir -p static/js/vendor static/fonts
          # دانلود socket.io client (minified)
          wget -q -O static/js/vendor/socket.io.min.js https://cdn.socket.io/4.5.0/socket.io.min.js
          # دانلود فونت وزیرمتن (فقط فایل‌های لازم)
          wget -q -O static/fonts/Vazirmatn-Regular.woff2 https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/Vazirmatn-Regular.woff2
          wget -q -O static/fonts/Vazirmatn-Bold.woff2 https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/Vazirmatn-Bold.woff2

      - name: 🔧 دریافت cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: 🚀 اجرای سرور Flask و تونل Cloudflare
        run: |
          python3 app.py &
          sleep 8
          nohup cloudflared tunnel --url http://localhost:5000 > tunnel.log 2>&1 &
          sleep 8
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ خطا در دریافت لینک تونل"
            cat tunnel.log
            exit 1
          fi
          echo "=========================================="
          echo "✅ لینک دسترسی شما: $TUNNEL_URL"
          echo "=========================================="
          echo "برای نگهداری سرویس، این جاب را متوقف نکنید."
          while true; do sleep 60; done