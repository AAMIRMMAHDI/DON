name: 📥 دانلود ویدیو و آپلود به سرور

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک ویدیو (مثلاً یوتیوب)'
        required: true
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: بررسی لینک
        run: |
          if [ -z "${{ github.event.inputs.video_url }}" ]; then
            echo "❌ لینک ویدیو وارد نشده است!"
            exit 1
          fi
          echo "✅ لینک دریافت شد: ${{ github.event.inputs.video_url }}"

      - name: نصب yt-dlp و ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ffmpeg
          pip3 install yt-dlp

      - name: دانلود ویدیو (تبدیل به mp4)
        run: |
          yt-dlp \
            --format "best[height<=720]/best" \
            --merge-output-format mp4 \
            --no-playlist \
            --output "video.mp4" \
            "${{ github.event.inputs.video_url }}"

      - name: نصب sshpass برای ارسال با پسورد
        run: sudo apt-get install -y sshpass

      - name: آپلود فایل به سرور خارجی
        run: |
          sshpass -p 'Amir.1388' scp \
            -o StrictHostKeyChecking=no \
            video.mp4 root@185.208.175.180:/root/
          echo "✅ فایل با موفقیت به سرور ارسال شد"

      - name: (اختیاری) آپلود به عنوان Artifact در GitHub
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: video.mp4