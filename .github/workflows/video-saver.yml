name: 📥 دانلود ساده و ذخیره در ریپو

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیو'
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 1. دریافت کدهای ریپو
        uses: actions/checkout@v4

      - name: 2. نصب yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install yt-dlp

      - name: 3. دانلود ویدیو
        run: |
          yt-dlp -f "best[height<=720]" --no-playlist -o "video.mp4" "${{ github.event.inputs.video_url }}"
          # اگر با پسوند دیگری ذخیره شد، آن را به video.mp4 تغییر نام می‌دهیم
          if [ -f "video.mp4" ]; then
            echo "OK"
          else
            # احتمالاً فرمت دیگری دارد
            mv video.* video.mp4 2>/dev/null || true
          fi

      - name: 4. انتقال به پوشه downloads
        run: |
          mkdir -p downloads
          if [ -f "video.mp4" ]; then
            mv video.mp4 downloads/
          else
            echo "❌ فایل ویدیو پیدا نشد!"
            exit 1
          fi

      - name: 5. commit و push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "تغییری وجود ندارد"
          else
            git commit -m "افزودن ویدیو از ${{ github.event.inputs.video_url }}"
            git push origin HEAD:${{ github.ref_name }}
          fi