name: 🌐 دانلودر تحت وب (تونل خودکار)

on:
  workflow_dispatch:

jobs:
  run-web-app:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 دریافت فایل‌های پروژه
        uses: actions/checkout@v4

      - name: 🐍 نصب Python و پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip wget

          python3 -m pip install --upgrade pip

          # نصب پکیج‌ها از requirements.txt
          pip3 install -r requirements.txt

      - name: ☁️ دریافت cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64

          chmod +x cloudflared-linux-amd64

          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: 🚀 اجرای Flask و ساخت تونل
        run: |
          echo "🚀 اجرای برنامه Flask..."

          # اجرای برنامه در پس‌زمینه
          nohup python3 app.py > app.log 2>&1 &

          sleep 10

          echo "📄 لاگ برنامه Flask:"
          cat app.log || true

          echo "🔗 برقراری تونل Cloudflare..."

          # اجرای تونل
          nohup cloudflared tunnel --url http://localhost:5000 > tunnel.log 2>&1 &

          sleep 15

          # استخراج لینک تونل
          TUNNEL_URL=$(grep -oE 'https://[-a-zA-Z0-9.]*trycloudflare.com' tunnel.log | head -1)

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ لینک تونل پیدا نشد."
            echo ""
            echo "📄 محتوای tunnel.log:"
            cat tunnel.log || true
            echo ""
            echo "📄 محتوای app.log:"
            cat app.log || true
            exit 1
          fi

          echo ""
          echo "=============================================="
          echo "🌐 آدرس سایت شما:"
          echo "👉 $TUNNEL_URL"
          echo "=============================================="
          echo ""
          echo "✅ برنامه با موفقیت اجرا شد."
          echo "تا وقتی Workflow فعال باشد سایت آنلاین می‌ماند."
          echo ""

          # جلوگیری از بسته شدن Job
          while true; do
            sleep 60
          done
